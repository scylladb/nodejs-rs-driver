# The goal of this workflow is to check if examples run without any errors
name: Run examples
env:
  DEBUG: napi:*
  APP_NAME: scylladb-javascript-driver
  PEDANTIC: true
"on":
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - '**'
jobs:
  build-and-run-examples:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu
          - host: macos-latest-large
            target: x86_64-apple-darwin
            build: yarn build --target x86_64-apple-darwin
        node: [ 24, current ]
    name: Build and run examples - ${{ matrix.settings.target }} - node@${{ matrix.node }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/setup
        with:
          host: ${{ matrix.settings.host }}
          target: ${{ matrix.settings.target }}
          node-version: ${{ matrix.node }}
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      # Scylla docker setup copied from https://github.com/scylladb/scylla-rust-driver/blob/main/.github/workflows/rust.yml
      # Here, we have two different commands, one for linux, other for macOS, as we cannot increase aio-max-nr on macOS runners
      - name: Setup 3-node Scylla cluster
        if: runner.os != 'macOS'
        run: |
          sudo sh -c "echo 2097152 >> /proc/sys/fs/aio-max-nr"
          docker compose -f .github/docker-compose.yml up -d --wait
      - name: Install Docker & Colima
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install docker colima
          colima start --cpu 4 --memory 8
      - name: Setup 3-node Scylla cluster (macOS)
        if: runner.os == 'macOS'
        run: |
          docker compose -f .github/docker-compose.yml up -d --wait --reactor-backend=epoll
      - name: Install examples dependencies
        run: |
          cd examples
          npm i
      - name: Run all examples
        run: SCYLLA_URI=172.42.0.2:9042 npm run examples
      - name: Stop the cluster
        if: ${{ always() }}
        run: docker compose -f .github/docker-compose.yml stop
      - name: Print the cluster logs
        if: ${{ always() }}
        run: docker compose -f .github/docker-compose.yml logs
      - name: Remove cluster
        run: docker compose -f .github/docker-compose.yml down
