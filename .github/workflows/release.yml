name: Release package
env:
  DEBUG: napi:*
  PEDANTIC: true
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu
            files: |
              index.linux-x64-gnu.node
              index.d.ts
              index.js
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu
            files: |
              index.linux-arm64-gnu.node
    name: Build for release stable - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/common/setup
        with:
          node-version: 24
          host: ${{ matrix.settings.host }}
          target: ${{ matrix.settings.target }}
      - name: Install libraries for linking
        run: sudo apt-get install -y libssl-dev
      - name: Build ${{ matrix.settings.target }}
        run: ${{ matrix.settings.build }}
      - name: Upload artifact - ${{ matrix.settings.target }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ matrix.settings.files }}
          if-no-files-found: error
  test-x86_64-unknown-linux-gnu:
    needs:
      - build
    name: test built package - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-x86_64-unknown-linux-gnu
      - name: Install dependencies
        run: npm i
      - name: Build TypeScript
        run: npm run build:ts
      - name: Install ccm
        # We need a copy of the repo for the ssl tests.
        # When installing ccm as a package, we do not save the certificates, 
        # that are present in the ./ssl directory
        run: |
          git clone https://github.com/scylladb/scylla-ccm.git
          pip install --user --upgrade psutil
          pip install --user https://github.com/scylladb/scylla-ccm/archive/master.zip
      - name: Run integration tests
        env: 
          CCM_IS_SCYLLA: "true"
          CCM_PATH: "./scylla-ccm"
        run: npm run integration
  # We test examples only on aarch64, as we cannot run integration test on this platform 
  # (For more information see MAINTENANCE.md, section Integration tests).
  test-aarch64-unknown-linux-gnu-examples:
    needs:
      - build
    name: test examples - aarch64-unknown-linux-gnu - node@24
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - name: Install dependencies
        run: npm i
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
      - name: Build TypeScript
        run: npm run build:ts
      - name: Setup 3-node Scylla cluster
        run: |
          sudo sh -c "echo 2097152 >> /proc/sys/fs/aio-max-nr"
          docker compose -f .github/docker-compose.yml up -d --wait
      - name: Install examples dependencies
        run: |
          cd examples
          npm i
      - name: Run all examples
        run: SCYLLA_URI=172.42.0.2:9042 npm run examples
      - name: Stop the cluster
        if: ${{ always() }}
        run: docker compose -f .github/docker-compose.yml stop
      - name: Print the cluster logs
        if: ${{ always() }}
        run: docker compose -f .github/docker-compose.yml logs
      - name: Remove cluster
        if: ${{ always() }}
        run: docker compose -f .github/docker-compose.yml down
  publish:
    needs:
      - test-x86_64-unknown-linux-gnu
      - test-aarch64-unknown-linux-gnu-examples
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - name: Install dependencies
        run: npm i
      # This creates the directories for subpackage for specific platforms
      - name: create npm dirs
        run: npm run create-npm-dirs
      # Download includes both the platform specific binaries, and generic index files
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      # napi artifacts copies binaries both to specific platform directories and the main directory
      # We want to release the binaries only in the platform specific directories
      # Additionally we need index files for compiling TS code
      - name: Copy index files
        run: cp ./artifacts/index.js ./artifacts/index.d.ts .
      - name: Build TypeScript
        run: npm run build:ts
      # Copies the downloaded artifacts to proper places in the npm package directories
      - name: Move artifacts
        run: npm run artifacts
      # Not necessary for the release, but useful for debugging in case some binaries are missing
      - name: List packages
        run: ls -R ./npm
      # Platform specific binaries will be released only in the sub-packages. 
      # We do not want them in the main package, where the napi-rs has placed them.
      - name: Clean up binaries 
        run: rm *.node
      - name: Publish
        run: |
          npm config set provenance true
          npm publish --provenance --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
